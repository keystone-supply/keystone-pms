name: live db extension guard

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/live-db-extension-guard.yml"
  pull_request:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/live-db-extension-guard.yml"
  workflow_dispatch:

jobs:
  live-db-extension-guard:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing required secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi
          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "Missing required secret: SUPABASE_PROJECT_REF"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.90.0

      - name: Link Supabase project
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}" --yes

      - name: Fail if any extension is in public schema
        shell: bash
        run: |
          RESULT="$(supabase db query --linked --output json "select e.extname, n.nspname as schema_name from pg_extension e join pg_namespace n on n.oid = e.extnamespace where n.nspname = 'public' order by e.extname;")"
          echo "${RESULT}"
          HAS_PUBLIC_EXTENSIONS="$(echo "${RESULT}" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{const rows=JSON.parse(d);if(rows.length>0){for(const row of rows){console.error('public extension: '+row.extname);}process.exit(1);}console.log('no public extensions');});")"
          echo "${HAS_PUBLIC_EXTENSIONS}"
