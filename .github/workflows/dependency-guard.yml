name: dependency guard

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "scripts/security/**"
  pull_request:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "scripts/security/**"

jobs:
  blocked-deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Blocked dependency check
        run: npm run security:blocked-deps
